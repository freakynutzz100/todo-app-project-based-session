version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: todo-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Asus@260422
      MYSQL_DATABASE: todo_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pAsus@260422"]
      timeout: 10s
      retries: 5
      start_period: 15s

  app:
    build: .
    container_name: todo-app-service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/todo_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Asus@260422
